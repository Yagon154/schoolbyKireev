<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Журнал оценок</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #f0f9ff;
}

.nav {
    display: flex;
    background: linear-gradient(90deg, #2563eb, #7c3aed);
}

.nav button {
    flex: 1;
    padding: 14px;
    color: white;
    background: none;
    border: none;
    cursor: pointer;
    font-weight: 500;
    transition: 0.2s;
}

.nav button:hover {
    background: rgba(255,255,255,0.15);
}

.tab {
    display: none;
    padding: 20px;
}

.active {
    display: block;
}

input, button {
    margin: 5px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid #cbd5f5;
}

input {
    background: white;
}

button {
    background: #22c55e;
    color: white;
    font-weight: bold;
}

button:hover {
    background: #16a34a;
}

table {
    border-collapse: collapse;
    width: 100%;
    background: white;
    border-radius: 10px;
    overflow: hidden;
}

td, th {
    border: 1px solid #e2e8f0;
    padding: 8px;
    text-align: center;
}

th {
    background: #3b82f6;
    color: white;
}
</style>
</head>

<body>

<div class="nav">
    <button onclick="openTab('load')">Файл</button>
    <button onclick="openTab('edit')">Журнал</button>
    <button onclick="openTab('statsTable')">Отчёт</button>
    <button onclick="openTab('statsChart')">График</button>
    <button onclick="openTab('help')">Справка</button>
    <button onclick="openTab('about')">Инфо</button>
</div>

<div id="load" class="tab active">
    <h2>Загрузка файла</h2>
    <input type="file" id="fileInput">
    <table id="dataTable"></table>
</div>

<div id="edit" class="tab">
    <h2>Редактор журнала</h2>

    <input type="text" id="name" placeholder="ФИО">
    <input type="text" id="class" placeholder="Класс">
    <input type="text" id="subject" placeholder="Предмет">
    <input type="number" id="grade" placeholder="Оценка">

    <button onclick="addRecord()">Добавить</button>
    <button onclick="saveFile()">Сохранить</button>

    <table id="editTable"></table>
</div>

<div id="statsTable" class="tab">
    <h2>Статистика</h2>
    <div id="statsOutput"></div>
</div>

<div id="statsChart" class="tab">
    <h2>Графики</h2>
    <canvas id="chart"></canvas>
</div>

<div id="help" class="tab">
    <h2>Справка</h2>
    <p>Файл — загрузка данных.</p>
    <p>Журнал — редактирование оценок.</p>
    <p>Отчёт — анализ данных.</p>
</div>

<div id="about" class="tab">
    <h2>О разработчике</h2>
    <p>ФИО: Киреев Егор Игоревич</p>
    <p>Email: egorkireev123456789@gmail.com</p>
    <img src="Macan.jpg" style="max-width:200px;border-radius:10px;">
</div>

<script>
let data = [];
let chartInstance = null;

function openTab(id) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

document.getElementById('fileInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    const ext = file.name.split('.').pop().toLowerCase();
    const reader = new FileReader();

    if (ext === 'xlsx') {
        reader.onload = function(e) {
            const workbook = XLSX.read(e.target.result, { type: 'array' });
            const sheetName = workbook.SheetNames[0];
            const sheet = workbook.Sheets[sheetName];
            const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
            parseXLSX(rows);
        };
        reader.readAsArrayBuffer(file);
    } else {
        reader.onload = function(e) {
            const text = e.target.result;
            parseCSV(text);
        };
        reader.readAsText(file, 'UTF-8');
    }
});

function parseXLSX(rows) {
    data = [];

    if (rows.length < 2) return;

    const headers = rows[0];

    const nameIndex = headers.findIndex(h => String(h).toLowerCase().includes("имя"));
    const surnameIndex = headers.findIndex(h => String(h).toLowerCase().includes("фам"));
    const patronymicIndex = headers.findIndex(h => String(h).toLowerCase().includes("отч"));
    const classIndex = headers.findIndex(h => String(h).toLowerCase().includes("класс"));

    for (let i = 1; i < rows.length; i++) {
        const row = rows[i];
        if (!row) continue;

        const fio = [
            row[surnameIndex] || "",
            row[nameIndex] || "",
            row[patronymicIndex] || ""
        ].join(" ").trim();

        const className = String(row[classIndex] || "").trim();

        for (let j = classIndex + 1; j < headers.length; j++) {
            const subject = String(headers[j] || "").trim();
            const grade = Number(row[j]);

            if (!subject || isNaN(grade)) continue;

            data.push({
                name: fio,
                class: className,
                subject: subject,
                grade: grade
            });
        }
    }

    renderTable();
}

function parseCSV(text) {
    data = [];

    const rows = text.split(/\r?\n/).filter(row => row.trim() !== "");
    if (rows.length === 0) {
        renderTable();
        return;
    }

    let delimiter = ",";
    if (rows[0].includes(";")) delimiter = ";";
    if (rows[0].includes("\t")) delimiter = "\t";

    let startIndex = 0;
    const firstRow = rows[0].split(delimiter).map(x => x.trim().toLowerCase());

    if (
        firstRow.includes('фио') ||
        firstRow.includes('класс') ||
        firstRow.includes('предмет') ||
        firstRow.includes('оценка') ||
        firstRow.includes('name') ||
        firstRow.includes('class') ||
        firstRow.includes('subject') ||
        firstRow.includes('grade')
    ) {
        startIndex = 1;
    }

    for (let i = startIndex; i < rows.length; i++) {
        const cols = rows[i].split(delimiter).map(x => x.trim());
        if (cols.length < 4) continue;

        data.push({
            name: cols[0],
            class: cols[1],
            subject: cols[2],
            grade: Number(cols[3])
        });
    }

    renderTable();
}

function renderTable() {
    let grouped = {};

    data.forEach(d => {
        const key = d.name + "||" + d.class;

        if (!grouped[key]) {
            grouped[key] = {
                name: d.name,
                class: d.class,
                subjects: {}
            };
        }

        grouped[key].subjects[d.subject] = d.grade;
    });

    let allSubjects = [];
    data.forEach(d => {
        if (!allSubjects.includes(d.subject)) {
            allSubjects.push(d.subject);
        }
    });

    let html = "<tr><th>ФИО</th><th>Класс</th>";
    allSubjects.forEach(subject => {
        html += `<th>${subject}</th>`;
    });
    html += "</tr>";

    Object.values(grouped).forEach(student => {
        html += `<tr>
            <td>${student.name}</td>
            <td>${student.class}</td>`;

        allSubjects.forEach(subject => {
            const grade = student.subjects[subject] ?? "";
            html += `<td>${grade}</td>`;
        });

        html += "</tr>";
    });

    document.getElementById("dataTable").innerHTML = html;
    document.getElementById("editTable").innerHTML = html;

    calcStats();
}

function addRecord() {
    const name = document.getElementById("name").value;
    const className = document.getElementById("class").value;
    const subject = document.getElementById("subject").value;
    const grade = Number(document.getElementById("grade").value);

    data.push({name, class: className, subject, grade});
    renderTable();
}

function saveFile() {
    let allSubjects = [];
    data.forEach(d => {
        if (!allSubjects.includes(d.subject)) {
            allSubjects.push(d.subject);
        }
    });

    let grouped = {};

    data.forEach(d => {
        const key = d.name + "||" + d.class;

        if (!grouped[key]) {
            grouped[key] = {
                name: d.name,
                class: d.class,
                subjects: {}
            };
        }

        grouped[key].subjects[d.subject] = d.grade;
    });

    let csv = "ФИО;Класс;" + allSubjects.join(";") + "\r\n";

    Object.values(grouped).forEach(student => {
        let row = [];
        row.push(`"${student.name || ""}"`);
        row.push(`"${student.class || ""}"`);

        allSubjects.forEach(subject => {
            row.push(`"${student.subjects[subject] ?? ""}"`);
        });

        csv += row.join(";") + "\r\n";
    });

    const blob = new Blob(["\uFEFF" + csv], {
        type: "text/csv;charset=utf-8;"
    });

    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "grades.csv";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function calcStats() {
    let stats = {};

    data.forEach(d => {
        if (!stats[d.subject]) stats[d.subject] = [];
        stats[d.subject].push(d.grade);
    });

    let html = "";

    for (let subject in stats) {
        let arr = stats[subject];
        let avg = arr.reduce((a,b)=>a+b,0)/arr.length;

        html += `<h3>${subject}</h3>`;
        html += `Среднее: ${avg.toFixed(2)}<br>`;
    }

    document.getElementById("statsOutput").innerHTML = html;

    drawChart(stats);
}

function drawChart(stats) {
    const ctx = document.getElementById("chart").getContext("2d");

    const labels = Object.keys(stats);
    const values = labels.map(s => {
        let arr = stats[s];
        return arr.reduce((a,b)=>a+b,0)/arr.length;
    });

    if (chartInstance) {
        chartInstance.destroy();
    }

    chartInstance = new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Средняя оценка',
                data: values
            }]
        }
    });
}
</script>

</body>
</html>
